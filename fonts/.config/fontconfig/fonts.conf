<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
    <!-- inject Custom Icon Fonts into the universal fallback chain so Qt apps
        (including Plasma notifications) can find it for PUA (private use area)
        characters --!>
    <match target="pattern">
        <edit name="family" mode="append_last">
            <string>Custom Icon Fonts</string>
        </edit>
    </match>
</fontconfig>
