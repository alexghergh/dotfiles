<?xml version='1.0'?>
<!DOCTYPE fontconfig SYSTEM 'fonts.dtd'>
<fontconfig>
 <!-- inject Custom Icon Fonts into the universal fallback chain so Qt apps
        (including Plasma notifications) can find it for PUA (private use area)
        characters -->
 <match target="pattern">
  <edit mode="append_last" name="family">
   <string>Custom Icon Fonts</string>
  </edit>
  <!-- <edit name="family" mode="prepend"> -->
  <!--     <string>Custom Icon Fonts</string> -->
  <!-- </edit> -->
 </match>
 <match target="font">
  <edit mode="assign" name="hinting">
   <bool>true</bool>
  </edit>
 </match>
 <match target="font">
  <edit mode="assign" name="hintstyle">
   <const>hintslight</const>
  </edit>
 </match>
 <dir>~/.local/share/fonts</dir>
 <match target="font">
  <edit mode="assign" name="antialias">
   <bool>true</bool>
  </edit>
 </match>
</fontconfig>
