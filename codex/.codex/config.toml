# options: untrusted, on-request, never
# ask for tool use approval
# with untrusted, the model always asks before using the tools
# with never, it never asks
# with on-request, it decides whether the tool it runs require user permission
approval_policy = "on-request"

# options: disabled, cached, live 
# this refers to run a web searching tool
# cached means an OpenAI maintained index; data might be stale, but avoids prompt injections
web_search = "cached"

# options: none, friendly, pragmatic
personality = "pragmatic"

# options: read-only, workspace-write, danger-full-access
# sandboxing means environment protection
# with read-only, it means the model has read-only access to the filesystem
# with workspace-write, it has read/write access to the local .git workspace + /tmp, or read-only otherwise
sandbox_mode = "read-only"

model = "gpt-5.4"
model_reasoning_effort = "high"

[sandbox_workspace_write]
# this option is different from web_search; web_search itself is a server-side tool that allows 
# the model to look up information; on the other hand, network_access allows local commands such
# as curl; the model is free to use web_search, but network access is disabled
# the model may still ask to use e.g. curl, but requires user approval
# see also: https://github.com/openai/codex/issues/3139#issuecomment-3254058065
# see also: https://developers.openai.com/codex/security
network_access = false

[features]
multi_agent = true

[agents]
max_threads = 6
max_depth = 2

[projects."/home/alex/projects/dotfiles/vim/.config/nvim"]
trust_level = "trusted"
